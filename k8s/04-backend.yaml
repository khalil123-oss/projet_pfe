---
# ─────────────────────────────────────────────────────────────
# Deployment Django Backend
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: topnet
  labels:
    app: backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  # Stratégie de rolling update sans downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      # Attendre que la DB soit prête avant de démarrer
      initContainers:
        - name: wait-for-db
          image: busybox:1.35
          command:
            - sh
            - "-c"
            - |
              until nc -z mariadb-service 3306; do
                echo "Waiting for MariaDB...";
                sleep 3;
              done;
              echo "MariaDB is ready!"
      containers:
        - name: backend
          # ⚠️  Remplacer par ton image Docker Hub ou registry local Minikube
          image: topnet-backend:latest
          imagePullPolicy: IfNotPresent   # Pour Minikube local
          ports:
            - containerPort: 8000
          env:
            # DB credentials depuis le Secret
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: topnet-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: topnet-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-password
            - name: DJANGO_SETTINGS_MODULE
              valueFrom:
                configMapKeyRef:
                  name: topnet-config
                  key: DJANGO_SETTINGS_MODULE
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: topnet-config
                  key: ALLOWED_HOSTS
          # Job de migration Django au démarrage du conteneur
          command:
            - sh
            - "-c"
            - |
              python manage.py migrate --noinput &&
              python manage.py runserver 0.0.0.0:8000
          readinessProbe:
            httpGet:
              path:  /admin/       # ⚠️  Adapte ce endpoint à ton projet
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /admin/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
 
---
# ─────────────────────────────────────────────────────────────
# Service Backend (NodePort pour tests Minikube)
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: topnet
  labels:
    app: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800    # Accessible via minikube_ip:30800
 
---
# ─────────────────────────────────────────────────────────────
# HorizontalPodAutoscaler Backend
# ─────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: topnet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120