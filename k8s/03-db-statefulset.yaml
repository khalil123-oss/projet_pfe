---
# ─────────────────────────────────────────────────────────────
# PersistentVolumeClaim pour les données MariaDB
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-pvc
  namespace: topnet
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Sur Minikube, le StorageClass "standard" est dispo par défaut
  storageClassName: standard
 
---
# ─────────────────────────────────────────────────────────────
# StatefulSet MariaDB (1 replica stable)
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: topnet
  labels:
    app: mariadb
    tier: database
spec:
  serviceName: "mariadb-service"
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
        tier: database
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: root-password
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-name
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-password
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql
          # Health checks — utilise mariadb-admin (dispo dans mariadb:latest)
          readinessProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -u
                - root
                - --password=$(MYSQL_ROOT_PASSWORD)
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -u
                - root
                - --password=$(MYSQL_ROOT_PASSWORD)
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: mariadb-storage
          persistentVolumeClaim:
            claimName: mariadb-pvc
 
---
# ─────────────────────────────────────────────────────────────
# Service MariaDB (ClusterIP — interne uniquement)
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
  namespace: topnet
  labels:
    app: mariadb
spec:
  type: ClusterIP
  selector:
    app: mariadb
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306