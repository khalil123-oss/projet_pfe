---
# ─────────────────────────────────────────────────────────────
# Deployment React Frontend (nginx)
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: topnet
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
        - name: frontend
          # ⚠️  Remplacer par ton image Docker Hub ou registry local Minikube
          image: topnet-frontend:latest
          imagePullPolicy: IfNotPresent   # Pour Minikube local
          ports:
            - containerPort: 80
          # VITE_API_URL est injecté au BUILD de l'image.
          # Pour un env dynamique au runtime, utiliser une nginx conf
          # qui lit une variable window.__RUNTIME_CONFIG__ (voir README).
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: topnet-config
                  key: VITE_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
 
---
# ─────────────────────────────────────────────────────────────
# Service Frontend (NodePort pour tests Minikube)
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: topnet
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080    # Accessible via minikube_ip:30080
 
---
# ─────────────────────────────────────────────────────────────
# HorizontalPodAutoscaler Frontend
# ─────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: topnet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120