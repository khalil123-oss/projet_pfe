services:
  frontend:
    build:
      context: ./FRontend
      dockerfile: Dockerfile
    container_name: topnet-frontend
    ports:
      - "80:80"
    environment:
      - BACKEND_HOST=topnet-backend
    networks:
      - topnet-net
    depends_on:
    - backend   
    restart: unless-stopped

  backend:
   build:
    context: ./Backend/TOPNET_PROJECT
    dockerfile: Dockerfile
   container_name: topnet-backend
   ports:
    - "8000:8000"
   networks:
    - topnet-net
   depends_on:
    db:
      condition: service_healthy
   environment:
    - DB_HOST=db
    - DB_NAME=topnet_db
    - DB_USER=topnet_user
    - DB_PASSWORD=123
    - DB_PORT=3306
   restart: unless-stopped

  db:
    image: mariadb:latest
    container_name: topnet-db
    environment:
      - MYSQL_ROOT_PASSWORD=123
      - MYSQL_DATABASE=topnet_db
      - MYSQL_USER=topnet_user
      - MYSQL_PASSWORD=123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - topnet-net
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-u", "root", "--password=123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  db_data:

networks:
  topnet-net:
    driver: bridge