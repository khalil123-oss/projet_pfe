namespace: topnet
 

replicaCount:
  frontend: 2
  backend: 2
  db: 1
 

image:
  frontend: topnet-frontend:latest
  backend: topnet-backend:latest
  db: mariadb:latest
  pullPolicy: IfNotPresent   
 

db:
  host: mariadb-service
  port: "3306"
  name: topnet_db
  user: topnet_user
  password: "123"
  rootPassword: "123"
  storage: 5Gi
  storageClass: standard
 

django:
  settingsModule: TOPNET_PROJECT.settings
  allowedHosts: "*"
 
# Configuration nginx (frontend)
nginx:
  backendHost: backend-service
 
# Services Kubernetes
service:
  frontend:
    type: NodePort
    port: 80
    nodePort: 30080
  backend:
    type: NodePort
    port: 8000
    nodePort: 30800
  db:
    type: ClusterIP
    port: 3306
 

hpa:
  frontend:
    minReplicas: 2
    maxReplicas: 5
    cpuUtilization: 70
    memoryUtilization: 80
  backend:
    minReplicas: 2
    maxReplicas: 5
    cpuUtilization: 70
    memoryUtilization: 80
 
# Ressources CPU/Mémoire
resources:
  frontend:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "250m"
  backend:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  db:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
 
# Health checks
probes:
  backend:
    readiness:
      path: /admin/
      initialDelaySeconds: 15
      periodSeconds: 10
    liveness:
      path: /admin/
      initialDelaySeconds: 30
      periodSeconds: 20
  frontend:
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 20