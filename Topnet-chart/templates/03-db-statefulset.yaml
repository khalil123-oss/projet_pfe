apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-pvc
  namespace: {{ .Values.namespace }}
  labels:
    app: mariadb
    managed-by: helm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.storage }}
  storageClassName: {{ .Values.db.storageClass }}
 
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: {{ .Values.namespace }}
  labels:
    app: mariadb
    tier: database
    managed-by: helm
spec:
  serviceName: "mariadb-service"
  replicas: {{ .Values.replicaCount.db }}
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
        tier: database
    spec:
      containers:
        - name: mariadb
          image: {{ .Values.image.db }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.db.port }}
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: root-password
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-name
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: db-password
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -u
                - root
                - --password=$(MYSQL_ROOT_PASSWORD)
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -u
                - root
                - --password=$(MYSQL_ROOT_PASSWORD)
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: {{ .Values.resources.db.requests.memory | quote }}
              cpu: {{ .Values.resources.db.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.db.limits.memory | quote }}
              cpu: {{ .Values.resources.db.limits.cpu | quote }}
      volumes:
        - name: mariadb-storage
          persistentVolumeClaim:
            claimName: mariadb-pvc
 
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
  namespace: {{ .Values.namespace }}
  labels:
    app: mariadb
    managed-by: helm
spec:
  type: {{ .Values.service.db.type }}
  selector:
    app: mariadb
  ports:
    - name: mysql
      port: {{ .Values.service.db.port }}
      targetPort: {{ .Values.service.db.port }}