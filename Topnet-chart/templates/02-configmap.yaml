apiVersion: v1
kind: ConfigMap
metadata:
  name: topnet-config
  namespace: {{ .Values.namespace }}
  labels:
    managed-by: helm
data:
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  DJANGO_SETTINGS_MODULE: {{ .Values.django.settingsModule | quote }}
  ALLOWED_HOSTS: {{ .Values.django.allowedHosts | quote }}